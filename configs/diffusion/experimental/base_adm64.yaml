config_name: base_adm64
model: diffusion
diffusion_backbone: adm
diffusion_preprocessing: parity_64
image_size: 64
diffusion_channels: 3
timesteps: 1000
base_channels: 64
time_dim: 128
schedule: cosine
beta_start: 0.0001
beta_end: 0.02
ema_decay: 0.999
num_res_blocks: 2
prediction_type: v
attention_resolutions:
  - 16
  - 8
class_dropout_prob: 0.1
guidance_scale: 3.0
sampler: ddim
sampling_steps: 50
ddim_eta: 0.0
grad_clip_norm: 1.0
amp_dtype: auto
download: false
sample_count: 16
eval_batch_size: 64
eval_num_generated_samples: 1000
eval_cfg_comparison_scales:
  - 0.0
  - 1.0
  - 3.0
  - 5.0
protocol:
  name: adm64_parity_v1
  description: >
    Locked parity recipe for fair cross-dataset comparison of the same pixel-space
    ADM diffusion family at 64x64 RGB with shared architecture, objective,
    preprocessing protocol, and evaluation defaults.
  dataset_variant: parity_64
  diffusion_preprocessing: parity_64
  eval_batch_size: 64
  eval_num_generated_samples: 1000
  eval_cfg_comparison_scales:
    - 0.0
    - 1.0
    - 3.0
    - 5.0
  locked_fields:
    - model
    - diffusion_backbone
    - diffusion_preprocessing
    - image_size
    - diffusion_channels
    - timesteps
    - base_channels
    - time_dim
    - schedule
    - beta_start
    - beta_end
    - ema_decay
    - num_res_blocks
    - prediction_type
    - attention_resolutions
    - class_dropout_prob
    - guidance_scale
    - sampler
    - sampling_steps
    - ddim_eta
    - grad_clip_norm
    - amp_dtype
    - sample_count
    - eval_num_generated_samples
    - eval_cfg_comparison_scales
  allowed_overrides:
    - config_name
    - dataset
    - dataset_variant
    - epochs
    - batch_size
    - num_workers
    - eval_batch_size
    - data_dir
    - output_dir
    - run_name
    - download
  identical_hyperparameters:
    image_size: 64
    diffusion_channels: 3
    diffusion_backbone: adm
    prediction_type: v
    schedule: cosine
    ema_decay: 0.999
    class_dropout_prob: 0.1
    sampler: ddim
    sampling_steps: 50
    ddim_eta: 0.0
    diffusion_preprocessing: parity_64
  allowed_differences:
    - batch_size
    - num_workers
    - epochs
    - eval_batch_size
    - data_dir
    - output_dir
    - run_name
    - dataset root / subset realization
