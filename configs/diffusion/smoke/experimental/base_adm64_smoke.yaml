config_name: base_adm64_smoke
model: diffusion
diffusion_backbone: adm
diffusion_preprocessing: parity_64
image_size: 64
diffusion_channels: 3
timesteps: 100
base_channels: 64
time_dim: 128
schedule: cosine
beta_start: 0.0001
beta_end: 0.02
ema_decay: 0.999
num_res_blocks: 2
prediction_type: v
attention_resolutions:
  - 16
  - 8
class_dropout_prob: 0.1
guidance_scale: 3.0
sampler: ddim
sampling_steps: 20
ddim_eta: 0.0
grad_clip_norm: 1.0
amp_dtype: auto
download: false
epochs: 1
sample_count: 4
eval_batch_size: 32
eval_num_generated_samples: 64
eval_cfg_comparison_scales:
  - 0.0
  - 3.0
protocol:
  name: adm64_parity_smoke_v1
  description: >
    Lightweight smoke-test protocol for fast end-to-end validation of the same
    64x64 RGB ADM diffusion parity pipeline, including training, checkpointing,
    checkpoint-only evaluation, artifact generation, summaries, best-run
    selection, and deliverables.
  dataset_variant: parity_64_smoke
  diffusion_preprocessing: parity_64
  eval_batch_size: 32
  eval_num_generated_samples: 64
  eval_cfg_comparison_scales:
    - 0.0
    - 3.0
  locked_fields:
    - model
    - diffusion_backbone
    - diffusion_preprocessing
    - image_size
    - diffusion_channels
    - timesteps
    - base_channels
    - time_dim
    - schedule
    - beta_start
    - beta_end
    - ema_decay
    - num_res_blocks
    - prediction_type
    - attention_resolutions
    - class_dropout_prob
    - guidance_scale
    - sampler
    - sampling_steps
    - ddim_eta
    - grad_clip_norm
    - amp_dtype
    - sample_count
    - eval_num_generated_samples
    - eval_cfg_comparison_scales
  allowed_overrides:
    - config_name
    - dataset
    - dataset_variant
    - epochs
    - batch_size
    - num_workers
    - eval_batch_size
    - data_dir
    - output_dir
    - run_name
    - download
  identical_hyperparameters:
    image_size: 64
    diffusion_channels: 3
    diffusion_backbone: adm
    timesteps: 100
    prediction_type: v
    schedule: cosine
    ema_decay: 0.999
    class_dropout_prob: 0.1
    sampler: ddim
    sampling_steps: 20
    ddim_eta: 0.0
    diffusion_preprocessing: parity_64
    sample_count: 4
    eval_num_generated_samples: 64
  allowed_differences:
    - batch_size
    - num_workers
    - epochs
    - eval_batch_size
    - data_dir
    - output_dir
    - run_name
    - dataset root / subset realization
